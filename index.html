async function start() {
  if (!navigator.mediaDevices?.getUserMedia) {
    setErr("Twoja przeglądarka nie obsługuje dostępu do kamery.\nSpróbuj Chrome lub Safari i upewnij się, że strona działa przez HTTPS.");
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }
    });
  } catch(e) {
    setErr("Brak dostępu do kamery.\nSprawdź uprawnienia w ustawieniach przeglądarki i odśwież stronę.\n(" + e.message + ")");
    return;
  }
  if (!active) { stream.getTracks().forEach(t => t.stop()); return; }
  streamRef.current = stream;
  const video = videoRef.current;
  video.srcObject = stream;
  video.setAttribute("playsinline", true);
  await video.play();
  setStatus("Skieruj kamerę na kod kreskowy lub QR…");

  function tick() {
    if (!active) return;
    const canvas = canvasRef.current;
    const ctx    = canvas.getContext("2d");
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
      if (code) {
        active = false;
        onDetected(code.data);
        return;
      }
    }
    rafRef.current = requestAnimationFrame(tick);
  }
  rafRef.current = requestAnimationFrame(tick);
}

start();
return () => {
  active = false;
  cancelAnimationFrame(rafRef.current);
  streamRef.current?.getTracks().forEach(t => t.stop());
};

function App() {
const [pallets,   setPallets]   = useState(() => store.get(STORAGE_KEY) || []);
const [eanDb,     setEanDb]     = useState(() => store.get(EAN_DB_KEY)  || {});
const [view,      setView]      = useState(“add”);
const [form,      setForm]      = useState({ ean:””, product:””, category:CATEGORIES[0], quantity:””, unit:“szt.”, location:LOCATIONS[0], notes:”” });
const [search,    setSearch]    = useState(””);
const [flash,     setFlash]     = useState(null);
const [showScan,  setShowScan]  = useState(false);
const [eanForm,   setEanForm]   = useState({ ean:””, product:””, category:CATEGORIES[0] });
const [eanSearch, setEanSearch] = useState(””);

const flash$ = (type, msg) => { setFlash({type,msg}); setTimeout(() => setFlash(null), 3000); };

const savePallets = d => store.set(STORAGE_KEY, d);
const saveEanDb   = d => store.set(EAN_DB_KEY,  d);

function fillFromEan(code, db) {
const e = (db || eanDb)[code];
if (e) { setForm(f => ({…f, ean:code, product:e.product, category:e.category})); flash$(“success”, `Rozpoznano: ${e.product}`); }
else   { setForm(f => ({…f, ean:code})); flash$(“warn”, `Nieznany kod: ${code} — uzupełnij ręcznie`); }
}

function handleEanInput(e) {
const code = e.target.value;
setForm(f => ({…f, ean:code}));
if (eanDb[code]) { const en = eanDb[code]; setForm(f => ({…f, ean:code, product:en.product, category:en.category})); }
}

function handleAdd() {
if (!form.product.trim()) { flash$(“error”,“Podaj nazwę produktu!”); return; }
const p = {
id: uid(), ean: form.ean.trim(), product: form.product.trim(),
category: form.category, quantity: form.quantity ? `${form.quantity} ${form.unit}` : “—”,
location: form.location, notes: form.notes.trim(), createdAt: new Date().toISOString(),
};
let db = eanDb;
if (p.ean && !eanDb[p.ean]) {
db = {…eanDb, [p.ean]: {product: p.product, category: p.category}};
setEanDb(db); saveEanDb(db);
}
const updated = [p, …pallets];
setPallets(updated); savePallets(updated);
setForm({ean:””, product:””, category:CATEGORIES[0], quantity:””, unit:“szt.”, location:LOCATIONS[0], notes:””});
flash$(“success”, `Paleta ${p.id} przyjęta!`);
}

function delPallet(id) { const u = pallets.filter(p => p.id !== id); setPallets(u); savePallets(u); }

function handleAddEan() {
if (!eanForm.ean.trim() || !eanForm.product.trim()) { flash$(“error”,“Podaj kod EAN i nazwę!”); return; }
const u = {…eanDb, [eanForm.ean.trim()]: {product: eanForm.product.trim(), category: eanForm.category}};
setEanDb(u); saveEanDb(u);
setEanForm({ean:””, product:””, category:CATEGORIES[0]});
flash$(“success”, `Dodano: ${eanForm.ean.trim()}`);
}
function delEan(code) { const u = {…eanDb}; delete u[code]; setEanDb(u); saveEanDb(u); }

const filtered = pallets.filter(p => [p.product,p.location,p.id,p.category,p.ean].some(v => v?.toLowerCase().includes(search.toLowerCase())));
const locCnt={}, catCnt={};
pallets.forEach(p => { locCnt[p.location]=(locCnt[p.location]||0)+1; catCnt[p.category]=(catCnt[p.category]||0)+1; });
const topLoc   = Object.entries(locCnt).sort((a,b) => b[1]-a[1]).slice(0,5);
const topCat   = Object.entries(catCnt).sort((a,b) => b[1]-a[1]);
const today    = new Date().toDateString();
const todayCnt = pallets.filter(p => new Date(p.createdAt).toDateString() === today).length;
const eanList  = Object.entries(eanDb).filter(([c,v]) => !eanSearch || c.includes(eanSearch) || v.product.toLowerCase().includes(eanSearch.toLowerCase()));

const NAV = [[“add”,“＋ PRZYJMIJ”],[“list”,`☰ LISTA (${pallets.length})`],[“stats”,“◈ STATYSTYKI”],[“ean”,`⬡ BAZA EAN (${Object.keys(eanDb).length})`]];

const YBtn = ({onClick,children,style={}}) => (
<button onClick={onClick} style={{ background:”#f5c518”,color:”#0f1117”,border:“none”,
fontFamily:”‘Courier New’,monospace”,fontWeight:900,fontSize:12,letterSpacing:1,cursor:“pointer”,…style }}>
{children}
</button>
);

return (
<div>
{showScan && <EanScanner onDetected={c => { setShowScan(false); fillFromEan(c, eanDb); }} onClose={() => setShowScan(false)}/>}

                                         display:"grid",gridTemplateColumns:"auto 1fr auto auto",gap:"0 14px",alignItems:"center" }}>
                  <div style={{ color:"#a8c4ff",fontFamily:"monospace",fontSize:13,letterSpacing:1,fontWeight:700 }}>{code}</div>
                  <div>
                    <div style={{ fontSize:13,fontWeight:700 }}>{v.product}</div>
                    <div style={{ fontSize:11,color:"#888" }}>{v.category}</div>
                  </div>
                  <div style={{ fontSize:11,color:"#555" }}>{pallets.filter(p => p.ean===code).length}× przyjęto</div>
                  <button onClick={() => delEan(code)} style={{ background:"transparent",border:"1px solid #3a2020",
                    color:"#884444",fontFamily:"inherit",fontSize:13,padding:"4px 8px",cursor:"pointer" }}>✕</button>
                </div>
              ))}
